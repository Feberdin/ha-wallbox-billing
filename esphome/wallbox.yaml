# Zweck:
# - Robuste Erfassung des Wallbox-Energiezaehlers (DSZ15D, 1000 Impulse/kWh)
# - Korrekte Summenbildung auch bei WLAN-/Home-Assistant-Neustarts
#
# Input:
# - S0-Impulse auf GPIO14
# - Manuelle Korrekturwerte aus Home Assistant (set/offset Number Entities)
#
# Output:
# - Sensor "Wallbox Zaehlerstand" (kWh, total_increasing)
# - Sensor "Wallbox Leistung" (W)
#
# Invarianten:
# - Gesamtstand = base_kwh + (impulse_runtime / 1000)
# - impulse_runtime steigt monoton (außer expliziter manueller Korrektur ueber base_kwh)
# - Persistenz-Checkpoint nur alle 50 Impulse (Flash-schonend)
#
# Debug:
# - Bei Abweichungen "Wallbox Rohimpulse seit Boot" und "Wallbox Zaehlerstand" vergleichen
# - Bei Reboot pruefen, dass "Wallbox Zaehlerstand" nach Neustart nicht zurueckspringt

esphome:
  name: esp32-wallbox
  friendly_name: ESP32-WallBox

  on_boot:
    priority: 600
    then:
      - lambda: |-
          // Falls gespeicherte Werte ungueltig sind, sichere Defaults setzen.
          if (std::isnan(id(wallbox_base_kwh)) || std::isinf(id(wallbox_base_kwh))) {
            id(wallbox_base_kwh) = 2775.01f;
          }
          if (id(wallbox_pulses_runtime) < id(wallbox_pulses_persisted)) {
            id(wallbox_pulses_runtime) = id(wallbox_pulses_persisted);
          }
          // Migrationsfall: Altbestand nur ueber Basis-kWh, noch keine Impulse gespeichert.
          if (id(wallbox_pulses_runtime) == 0 && id(wallbox_base_kwh) > 0.0f) {
            id(wallbox_pulses_runtime) = (uint64_t) llroundf(id(wallbox_base_kwh) * 1000.0f);
            id(wallbox_pulses_persisted) = id(wallbox_pulses_runtime);
            id(wallbox_base_kwh) = 0.0f;
          }
          id(wallbox_last_raw_pulses) = 0;
          id(wallbox_unsaved_pulses) = 0;

esp32:
  board: esp32dev
  framework:
    type: esp-idf

logger:

api:
  encryption:
    key: "nsEOmUr9Tj2Kbr5lEcOT5W+/5UICecUXTH2Biv6WJt0="
  reboot_timeout: 0s

ota:
