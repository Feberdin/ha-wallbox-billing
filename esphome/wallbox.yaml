# Persistente Zaehlerdaten im Flash
globals:
  # Statischer Basiswert in kWh (fuer manuelle Set/Offset-Korrekturen).
  - id: wallbox_base_kwh
    type: float
    restore_value: true
    initial_value: "2775.01"
  # Laufender Gesamtimpulszaehler (fuer Berechnung und Anzeige).
  - id: wallbox_pulses_runtime
    type: uint64_t
    restore_value: false
    initial_value: "0"
  # Letzter persistenter Checkpoint (wird nur alle 50 Impulse aktualisiert).
  - id: wallbox_pulses_persisted
    type: uint64_t
    restore_value: true
    initial_value: "0"
  # Hilfszaehler seit letztem Flash-Checkpoint (nicht persistent).
  - id: wallbox_unsaved_pulses
    type: uint32_t
    restore_value: false
    initial_value: "0"
  # Letzter roher Pulse-Counter-Wert seit Boot (nicht persistent).
  - id: wallbox_last_raw_pulses
    type: uint32_t
    restore_value: false
    initial_value: "0"

# ====== Editierbare Felder in Home Assistant (als Eingabefeld statt Slider) ======
number:
  # 1) Startwert setzen (überschreibt wallbox_energy_kwh dauerhaft)
  - platform: template
    name: "Wallbox Zählerstand setzen"
    id: wallbox_set_kwh
    unit_of_measurement: "kWh"
    min_value: 0
    max_value: 1000000
    step: 0.001
    mode: box
    optimistic: true
    restore_value: true
    initial_value: 2775.01
    set_action:
      - lambda: |-
          // Absoluten Sollwert setzen, ohne Impulsverlauf zu verlieren:
          // Neuer Basiswert = Soll - (bisherige Impulse in kWh)
          const float pulses_kwh = ((float) id(wallbox_pulses_runtime)) / 1000.0f;
          id(wallbox_base_kwh) = (float)x - pulses_kwh;
      - component.update: wallbox_energy_total

  # 2) Offset-Korrektur (addiert/subtrahiert einmalig)
  - platform: template
    name: "Wallbox Zählerstand Offset"
    id: wallbox_offset_kwh
    unit_of_measurement: "kWh"
    min_value: -10000
    max_value: 10000
    step: 0.001
    mode: box
    optimistic: true
    restore_value: true
    initial_value: 0
    set_action:
      - lambda: |-
          id(wallbox_base_kwh) += (float)x;
          // Offset wieder auf 0 zurücksetzen, damit es "einmalig" wirkt
          id(wallbox_offset_kwh).publish_state(0);
      - component.update: wallbox_energy_total

sensor:
  # S0 Impulsrate (imp/min) -> Leistung (W); Rohimpulse seit Boot fuer Delta-Bildung
  - platform: pulse_counter
    pin:
      number: GPIO14
      mode:
        input: true
        pullup: true
      inverted: true

    name: "Wallbox Leistung"
    id: wallbox_power
    unit_of_measurement: "W"
    device_class: power
    state_class: measurement
    update_interval: 10s
    internal_filter: 13us
    accuracy_decimals: 0

    filters:
      - throttle_average: 30s
      - lambda: |-
          if (x < 1.0) return 0.0;
          return x;
      # Annahme: 1000 imp/kWh -> W = (imp/min) * 60
      - multiply: 60.0
    total:
      name: "Wallbox Rohimpulse seit Boot"
      id: wallbox_raw_pulses_boot
      unit_of_measurement: "imp"
      state_class: total_increasing
      accuracy_decimals: 0

  # Absoluter Zaehlerstand aus Basis-kWh + Gesamtimpulsen
  - platform: template
    name: "Wallbox Zählerstand"
    id: wallbox_energy_total
    unit_of_measurement: "kWh"
    device_class: energy
    state_class: total_increasing
    accuracy_decimals: 3
    update_interval: 10s
    lambda: |-
      return id(wallbox_base_kwh) + (((float) id(wallbox_pulses_runtime)) / 1000.0f);

# Impulse robust aufsummieren und mit Checkpoint persistieren.
interval:
  - interval: 10s
    then:
      - lambda: |-
          const float raw_state = id(wallbox_raw_pulses_boot).state;
          if (std::isnan(raw_state) || std::isinf(raw_state) || raw_state < 0.0f) {
            return;
          }

          const uint32_t raw_now = (uint32_t) llroundf(raw_state);
          uint32_t delta = 0;
          if (raw_now >= id(wallbox_last_raw_pulses)) {
            delta = raw_now - id(wallbox_last_raw_pulses);
          } else {
            // Pulse-Counter wurde neu gestartet (ESP reboot) -> seit Boot neu zaehlen.
            delta = raw_now;
          }

          id(wallbox_last_raw_pulses) = raw_now;
          if (delta == 0) {
            return;
          }

          id(wallbox_pulses_runtime) += (uint64_t) delta;
          id(wallbox_unsaved_pulses) += delta;

          // Persistenz nur in groesseren Bloecken, um Flash-Schreiblast zu begrenzen.
          if (id(wallbox_unsaved_pulses) >= 50) {
            id(wallbox_pulses_persisted) = id(wallbox_pulses_runtime);
            id(wallbox_unsaved_pulses) = 0;
          }

      - component.update: wallbox_energy_total
